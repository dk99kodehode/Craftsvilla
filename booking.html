<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact-Craftsvilla</title>
    <link rel="stylesheet" href="booking.css" />
  </head>

  <body>
    <header>
      <div class="logo">
        <img src="images/logo.png" alt="logo" />
        <div class="logo-text">
          <h2>Craftsvilla</h2>
          <p>Workshop</p>
        </div>
      </div>

      <nav class="head-nav">
        <a href="index.html">Home</a>
        <a href="gallery.html">Gallery</a>
        <a href="booking.html">Booking</a>
        <a href="contact.html">Contact</a>
        <a href="index.html#about">About</a>
      </nav>

      <button class="signup">Login/Signup</button>
    </header>


    <!---------BOOKING FORM--------->
    <main>
      <section class="container">
        <div class="booking-top">
          <h2>Book your appointment!</h2>
        </div>

        <form class="form-container">
          <div class="form-group">
            <label for="firstname">First Name:</label>
            <input type="name" id="firstname" placeholder="Crafts" required />
          </div>

          <div class="form-group">
            <label for="lastname">Last Name:</label>
            <input type="name" id="lastname" placeholder="Villa" required />
          </div>

          <div class="form-group">
            <label for="email">Email:</label>
            <input
              type="email"
              id="email"
              placeholder="Craftsvilla@gmail.com"
            />
          </div>

          <label for="tel">Phone:</label>
          <input
            type="tel"
            name="tel"
            id="tel"
            placeholder="(+47)123-456-789"
          />

          <label for="quantity">People</label>
          <input
            type="number"
            id="quantity"
            name="quanitity"
            min="0"
            max="99"
            value="1"
          />

          <div class="form-group">
            <label for="workshops">Location</label>
            <select id="workshop">
              <option value="molde">Molde</option>
              <option value="aalesund">Aalesund</option>
              <option value="trondheim">Trondheim</option></select
            ><br /><br />

            <div>
              <label for="date">Date:</label>
              <input type="date" />
            </div>
          </div>

          <label for="feedback" class="feedback-label">Special requests</label
          ><br />
          <textarea name="feedback" id="feedback" rows="10"></textarea>


          <input id="submit" type="submit" value="Send" />
        </form>
      </section>
    </main>

    <!------------FOOTER------------->
    <footer>
      <div class="socials">
        <img src="images/social media/x.png" alt="twitter" />
        <img src="images/social media/instagram.png" alt="instagram" />
        <img src="images/social media/facebook.png" alt="facebook" />
      </div>

      <nav class="nav-footer">
        <a href="index.html">Home</a>
        <a href="gallery.html">Gallery</a>
        <a href="booking.html">Booking</a>
        <a href="contact.html">Contact</a>
        <a href="index.html#about">About</a>
      </nav>
    </footer>
  </body>
</html>
