<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gallery-Craftsvilla</title>
    <link rel="stylesheet" href="gallery.css" />
    <script src="javascript.js"></script>
  </head>

  <body>
    <header>
      <div class="logo">
        <img src="images/logo.png" alt="logo" />
        <div class="logo-text">
          <h2>Craftsvilla</h2>
          <p>Workshop</p>
        </div>
      </div>

      <nav class="head-nav">
        <a href="index.html">Home</a>
        <a href="gallery.html">Gallery</a>
        <a href="booking.html">Booking</a>
        <a href="contact.html">Contact</a>
        <a href="index.html#about">About</a>
      </nav>

      <button class="signup">Login/Signup</button>
    </header>

    <main>
      <!-----------ROW 1------------>
      <section class="cards-container">
        <div class="cards-layout">
          <article class="cards article-preview">
            <img src="images/art cards/tall-building.png" alt="tall building" />
            <div class="cards-text"></div>
          </article>

         <article class="cards article-preview">
            <img src="images/art cards/drawing-lady.png" alt="drawing-lady" />
            <div class="cards-text"></div>
          </article>

         <article class="cards article-preview">
            <img src="images/art cards/lady-drawing.png" alt="lady-drawing" />
            <div class="cards-text"></div>
          </article>

        
          <article class="cards article-preview">
            <img src="images/art cards/flower.png" alt="flower" />
            <div class="cards-text"></div>
          </article>

        </div>
      </section>

     
      

    <!------------FOOTER------------->
    <footer>
      <div class="socials">
        <img src="images/social media/x.png" alt="twitter" />
        <img src="images/social media/instagram.png" alt="instagram" />
        <img src="images/social media/facebook.png" alt="facebook" />
      </div>

      <nav class="nav-footer">
        <a href="index.html">Home</a>
        <a href="gallery.html">Gallery</a>
        <a href="booking.html">Booking</a>
        <a href="contact.html">Contact</a>
        <a href="index.html#about">About</a>
      </nav>
    </footer>
  </body>
</html>
